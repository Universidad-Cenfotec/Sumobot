<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sumobot LLM BLE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1d23;
      --surface:   #22262e;
      --border:    #2e3340;
      --accent:    #38b6ff;
      --accent-dim:#1e7ab0;
      --accent-glow: rgba(56,182,255,0.18);
      --text:      #dce6f0;
      --muted:     #7a8699;
      --success:   #3ddba8;
      --error:     #f55f5f;
      --warn:      #f5a623;
      --radius:    10px;
      --font-ui:   'Rajdhani', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      min-height: 100vh;
      padding: 24px 16px 48px;
      font-size: 16px;
    }

    /* ── Header ── */
    header {
      max-width: 720px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dim) 100%);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .logo-icon svg { width: 26px; height: 26px; fill: #fff; }

    header h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      line-height: 1;
    }

    header h1 span { color: var(--accent); }

    header p {
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 3px;
      text-transform: uppercase;
    }

    /* ── Layout ── */
    .container {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
    }

    .card-title {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 14px;
      font-weight: 600;
    }

    /* ── Status rows ── */
    .status-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }

    .dot.ok    { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .dot.err   { background: var(--error);   box-shadow: 0 0 8px var(--error); }
    .dot.pulse {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.3; }
    }

    .status-label {
      font-family: var(--font-mono);
      font-size: 0.88rem;
      color: var(--text);
      flex: 1;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      font-family: var(--font-ui);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s, box-shadow 0.18s;
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover {
      background: #5cc6ff;
      box-shadow: 0 0 18px var(--accent-glow);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Textarea / Input ── */
    textarea, input[type="text"] {
      width: 100%;
      background: #191c22;
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1rem;
      padding: 12px 14px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus, input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    textarea { min-height: 80px; font-size: 0.95rem; }

    /* ── Output ── */
    .output-box {
      background: #13161b;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 1rem;
      color: var(--accent);
      min-height: 52px;
      letter-spacing: 0.08em;
      word-break: break-all;
      transition: box-shadow 0.3s;
    }

    .output-box.has-data {
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .output-box .placeholder {
      color: var(--muted);
      font-size: 0.82rem;
    }

    /* ── Command chips ── */
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 5px;
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
    }

    .chip-F { background: rgba(61,219,168,0.15); color: var(--success); border: 1px solid rgba(61,219,168,0.3); }
    .chip-B { background: rgba(245,95,95,0.15);  color: var(--error);   border: 1px solid rgba(245,95,95,0.3); }
    .chip-L { background: rgba(56,182,255,0.15); color: var(--accent);  border: 1px solid rgba(56,182,255,0.3); }
    .chip-R { background: rgba(245,166,35,0.15); color: var(--warn);    border: 1px solid rgba(245,166,35,0.3); }

    /* ── Action bar ── */
    .action-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    /* ── Log ── */
    .log {
      background: #13161b;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 12px 14px;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      max-height: 140px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log .entry { display: block; }
    .log .entry.info  { color: var(--muted); }
    .log .entry.ok    { color: var(--success); }
    .log .entry.err   { color: var(--error); }
    .log .entry.send  { color: var(--accent); }

    .log::-webkit-scrollbar { width: 4px; }
    .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      display: inline-block;
      width: 15px;
      height: 15px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      body { padding: 16px 10px 40px; }
      .card { padding: 16px 14px; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .action-bar .btn { justify-content: center; }
      .status-row { flex-wrap: wrap; gap: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-icon">
      <!-- robot icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="8" width="14" height="10" rx="2"/>
        <rect x="9" y="4" width="6" height="4" rx="1"/>
        <line x1="12" y1="4" x2="12" y2="3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="12" cy="2.5" r="1"/>
        <circle cx="9" cy="12" r="1.3"/>
        <circle cx="15" cy="12" r="1.3"/>
        <rect x="9" y="15" width="6" height="1.5" rx="0.75"/>
        <rect x="3" y="10" width="2" height="5" rx="1"/>
        <rect x="19" y="10" width="2" height="5" rx="1"/>
      </svg>
    </div>
    <div>
      <h1>Sumo<span>bot</span> LLM</h1>
      <p>BLE · Local AI · Command Generator</p>
    </div>
  </header>

  <div class="container">

    <!-- Connections -->
    <div class="card">
      <div class="card-title">Conexiones</div>

      <div class="status-row" style="margin-bottom:14px">
        <div class="dot" id="ollamaDot"></div>
        <span class="status-label" id="ollamaStatus">Ollama — no verificado</span>
        <button class="btn btn-ghost" id="checkOllama">Verificar</button>
      </div>

      <div class="status-row">
        <div class="dot" id="bleDot"></div>
        <span class="status-label" id="bleStatus">Robot BLE — no conectado</span>
        <button class="btn btn-ghost" id="connectBLE">Conectar</button>
      </div>
    </div>

    <!-- Instruction -->
    <div class="card">
      <div class="card-title">Instrucción</div>
      <textarea
        id="instruction"
        placeholder="Ej: avanza dos veces, gira a la izquierda y retrocede una vez"
      ></textarea>

      <div style="margin-top:14px">
        <div class="action-bar">
          <button class="btn btn-primary" id="askLLM">
            <span id="btnText">Generar y enviar</span>
            <span id="btnSpinner" style="display:none"><span class="spinner"></span></span>
          </button>
          <button class="btn btn-ghost" id="sendRobot">Reenviar al robot</button>
        </div>
      </div>
    </div>

    <!-- Output -->
    <div class="card">
      <div class="card-title">Secuencia generada</div>
      <div class="output-box" id="outputRaw">
        <span class="placeholder">Esperando respuesta del modelo…</span>
      </div>
      <div class="chips" id="chips"></div>
    </div>

    <!-- Log -->
    <div class="card">
      <div class="card-title">Log</div>
      <div class="log" id="log">
        <span class="entry info">Sistema iniciado.</span>
      </div>
    </div>

  </div>

  <script>
    const OLLAMA_URL = "http://127.0.0.1:11434/api/generate";
    const MODEL = "llama3.2";

    const SERVICE_UUID = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
    const CHAR_UUID    = "6e400002-b5a3-f393-e0a9-e50e24dcca9e";

    const CMD_LABELS = { F: "▲ FWD", B: "▼ BACK", L: "◀ LEFT", R: "▶ RIGHT" };

    let device = null;
    let characteristic = null;
    let lastSequence = "";

    // ── helpers ──────────────────────────────────────────────
    function setDot(id, state) { // state: '' | 'ok' | 'err' | 'pulse'
      const d = document.getElementById(id);
      d.className = "dot" + (state ? " " + state : "");
    }

    function log(msg, type = "info") {
      const el = document.getElementById("log");
      const span = document.createElement("span");
      span.className = "entry " + type;
      const now = new Date().toLocaleTimeString("es-CR", { hour12: false });
      span.textContent = `[${now}] ${msg}`;
      el.appendChild(span);
      el.scrollTop = el.scrollHeight;
    }

    function renderOutput(seq) {
      const rawEl = document.getElementById("outputRaw");
      const chipsEl = document.getElementById("chips");

      if (!seq) {
        rawEl.innerHTML = '<span class="placeholder">Sin comandos.</span>';
        rawEl.classList.remove("has-data");
        chipsEl.innerHTML = "";
        return;
      }

      rawEl.textContent = seq;
      rawEl.classList.add("has-data");

      chipsEl.innerHTML = "";
      seq.split(",").forEach(cmd => {
        if (!CMD_LABELS[cmd]) return;
        const chip = document.createElement("span");
        chip.className = "chip chip-" + cmd;
        chip.textContent = CMD_LABELS[cmd];
        chipsEl.appendChild(chip);
      });
    }

    function setBusy(busy) {
      document.getElementById("btnText").style.display = busy ? "none" : "inline";
      document.getElementById("btnSpinner").style.display = busy ? "inline" : "none";
      document.getElementById("askLLM").disabled = busy;
    }

    // ── Ollama ────────────────────────────────────────────────
    async function checkOllama() {
      setDot("ollamaDot", "pulse");
      document.getElementById("ollamaStatus").textContent = "Verificando…";
      log("Verificando Ollama...");
      try {
        const res = await fetch(OLLAMA_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: MODEL, prompt: "Respond with OK", stream: false })
        });
        if (res.ok) {
          setDot("ollamaDot", "ok");
          document.getElementById("ollamaStatus").textContent = `Ollama conectado · ${MODEL}`;
          log(`Ollama OK — modelo: ${MODEL}`, "ok");
        } else {
          throw new Error("HTTP " + res.status);
        }
      } catch (e) {
        setDot("ollamaDot", "err");
        document.getElementById("ollamaStatus").textContent = "Ollama no accesible";
        log("Error Ollama: " + e.message, "err");
      }
    }

    // ── BLE ───────────────────────────────────────────────────
    async function connectBLE() {
      setDot("bleDot", "pulse");
      document.getElementById("bleStatus").textContent = "Conectando…";
      log("Buscando dispositivo BLE…");
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        characteristic = await service.getCharacteristic(CHAR_UUID);

        setDot("bleDot", "ok");
        document.getElementById("bleStatus").textContent = "Robot BLE — " + (device.name || "conectado");
        log("BLE conectado: " + (device.name || "dispositivo"), "ok");

        device.addEventListener("gattserverdisconnected", () => {
          setDot("bleDot", "err");
          document.getElementById("bleStatus").textContent = "Robot BLE — desconectado";
          characteristic = null;
          log("BLE desconectado.", "err");
        });
      } catch (e) {
        setDot("bleDot", "err");
        document.getElementById("bleStatus").textContent = "Error BLE";
        log("Error BLE: " + e.message, "err");
      }
    }

    // ── LLM + auto-send ───────────────────────────────────────
    async function askLLM() {
      const instruction = document.getElementById("instruction").value.trim();
      if (!instruction) { log("Escriba una instrucción.", "err"); return; }

      setBusy(true);
      log("Enviando instrucción al LLM…");

      const prompt = `Translate the instruction into robot commands.

Allowed commands:
F = forward
B = back
L = left
R = right

Rules:
Return ONLY a sequence separated by commas, nothing else.

Example:
F,F,L,R,B

Instruction:
${instruction}`;

      try {
        const res = await fetch(OLLAMA_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ model: MODEL, prompt, stream: false })
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const data = await res.json();
        let text = (data.response || "").trim().replace(/[^FBLR,]/g, "");

        lastSequence = text;
        renderOutput(text);

        if (text) {
          log(`Secuencia generada: ${text}`, "ok");
          await sendRobot(true); // auto-send
        } else {
          log("El LLM no generó comandos válidos.", "err");
        }
      } catch (e) {
        log("Error LLM: " + e.message, "err");
      } finally {
        setBusy(false);
      }
    }

    // ── Send BLE ──────────────────────────────────────────────
    async function sendRobot(auto = false) {
      if (!characteristic) {
        log("Robot no conectado por BLE.", "err");
        if (!auto) alert("Robot no conectado");
        return;
      }
      if (!lastSequence) {
        log("Sin secuencia para enviar.", "err");
        if (!auto) alert("No hay secuencia para enviar");
        return;
      }
      try {
        const encoder = new TextEncoder();
        await characteristic.writeValueWithoutResponse(encoder.encode(lastSequence));
        log(`Secuencia enviada → ${lastSequence}`, "send");
      } catch (e) {
        log("Error al enviar BLE: " + e.message, "err");
        if (!auto) alert("Error enviando al robot");
      }
    }

    // ── Events ────────────────────────────────────────────────
    document.getElementById("checkOllama").onclick = checkOllama;
    document.getElementById("connectBLE").onclick  = connectBLE;
    document.getElementById("askLLM").onclick       = askLLM;
    document.getElementById("sendRobot").onclick    = () => sendRobot(false);
  </script>
</body>
</html>
